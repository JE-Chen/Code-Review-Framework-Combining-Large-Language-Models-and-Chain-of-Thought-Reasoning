# nginx reverse proxy: collapses Grafana / cAdvisor / Prometheus / prthinker
# onto a single host port (9000). Path-based routing keeps the upstream
# services on the docker default network with no published ports.
#
# All three monitoring UIs are configured to run under a sub-path so they
# generate correct asset links (GF_SERVE_FROM_SUB_PATH for Grafana,
# --url_base_prefix for cAdvisor, --web.route-prefix for Prometheus).
# nginx therefore preserves the prefix on proxy_pass (no trailing slash).

worker_processes auto;
events { worker_connections 1024; }

http {
    server_tokens off;

    # Required for Grafana live updates over WebSocket.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream prthinker  { server prthinker:9000; }
    upstream grafana    { server grafana:3000; }
    upstream cadvisor   { server cadvisor:8080; }
    upstream prometheus { server prometheus:9090; }

    server {
        listen 80;
        client_max_body_size 50M;

        # Grafana — preserves the /grafana/ prefix so its sub-path
        # config can serve assets at the right location.
        location /grafana/ {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }

        location /cadvisor/ {
            proxy_pass http://cadvisor;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /prometheus/ {
            proxy_pass http://prometheus;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Default route: everything else lands on the prthinker FastAPI
        # server — /healthz, /review/*, /ask/*, /rag, /metrics, ...
        location / {
            proxy_pass http://prthinker;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
}
