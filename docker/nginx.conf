# nginx config used by docker-compose.yml.
#
# - Terminates TLS on :443 (cert paths configurable via env).
# - Forwards plain HTTP to the prthinker container on :9000.
# - Enforces a bearer-token check via `$http_authorization` — the expected
#   value is injected from the host's PRTHINKER_BACKEND_TOKEN env var at
#   container start (see docker-compose.yml's `command:` line).
#
# For development you can set PRTHINKER_TLS_DISABLED=1 in .env to drop
# TLS and listen on :80 — only do this on an isolated network.

events {
  worker_connections 1024;
}

http {
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  client_max_body_size 16M;        # diffs can be large; keep some headroom
  proxy_read_timeout 900s;         # long pipeline runs need patience

  upstream prthinker_backend {
    server prthinker:9000;
    keepalive 16;
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # /healthz bypasses the auth check so a load balancer can probe.
    location = /healthz {
      proxy_pass http://prthinker_backend;
      access_log off;
    }

    location / {
      # Bearer-token enforcement. The expected value is rendered into
      # this file by entrypoint.sh on container start.
      if ($http_authorization != "Bearer __PRTHINKER_BACKEND_TOKEN__") {
        return 401 "{\"error\":\"unauthorized\"}";
      }

      proxy_pass http://prthinker_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }
  }
}
