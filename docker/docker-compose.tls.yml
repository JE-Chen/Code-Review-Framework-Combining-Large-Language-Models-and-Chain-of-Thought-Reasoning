# Optional TLS overlay — adds an nginx reverse proxy with TLS termination
# and bearer-token auth in front of the prthinker container.
#
# Usage:
#   cp .env.example .env       # set PRTHINKER_BACKEND_TOKEN + TLS_CERT_DIR
#   docker compose -f docker-compose.server-qwen3-coder.yml -f docker-compose.tls.yml up -d
#   curl https://your-host/healthz -H "Authorization: Bearer <token>"
#
# Notes:
#   - Drops the host port mapping on `prthinker` (only nginx is public).
#   - nginx listens on PRTHINKER_HOST_PORT (default 443) on the host.

services:
  prthinker:
    ports: !reset []
    expose:
      - "9000"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - prthinker
    environment:
      PRTHINKER_BACKEND_TOKEN: ${PRTHINKER_BACKEND_TOKEN:?PRTHINKER_BACKEND_TOKEN is required}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./entrypoint-nginx.sh:/entrypoint.sh:ro
      - ${TLS_CERT_DIR:-./tls}:/etc/nginx/tls:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "${PRTHINKER_HOST_PORT:-443}:443"
    networks:
      - internal

networks:
  internal:
    driver: bridge
