# prthinker self-hosted deployment.
#
# Usage:
#   cp .env.example .env       # then edit values
#   docker compose up -d
#   curl http://localhost:9000/healthz
#
# Single service:
#   - prthinker  the FastAPI inference server (GPU), exposed directly on :9000
#
# Two named volumes keep state across image rebuilds:
#   - hf_cache    HuggingFace model weights (~80 GB for Qwen3-Coder-30B)
#   - data        dismissed.jsonl + accepted.jsonl + SQLite stores

services:
  prthinker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
      args:
        CUDA_VERSION: ${CUDA_VERSION:-12.2.0}
    image: prthinker:server-latest
    restart: unless-stopped
    runtime: nvidia
    environment:
      # All PRTHINKER_* are picked up by the server at boot. See
      # READMEs/setup.md for the full list.
      PRTHINKER_DISMISSED_PATH: /data/dismissed.jsonl
      PRTHINKER_ACCEPTED_PATH:  /data/accepted.jsonl
      PRTHINKER_CACHE_PATH:     /data/cache.sqlite
      PRTHINKER_TELEMETRY_PATH: /data/telemetry.sqlite
      PRTHINKER_CACHE_ENABLED:    "true"
      PRTHINKER_TELEMETRY_ENABLED: "true"
      HF_HOME: /cache/huggingface
    volumes:
      - hf_cache:/cache/huggingface
      - data:/data
      # LoRA adapter weights live on the host (trained out-of-band) and the
      # server references them via an absolute host path baked into
      # codes/run/fastapi_server.py. Mount the same path read-only so the
      # in-container resolver finds them.
      - /home/nknul40s/LLM_Research/codes/train/outputs-lora-qwen3-coder-30b:/home/nknul40s/LLM_Research/codes/train/outputs-lora-qwen3-coder-30b:ro
    ports:
      - "${PRTHINKER_HOST_PORT:-9000}:9000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  hf_cache:
  data:
