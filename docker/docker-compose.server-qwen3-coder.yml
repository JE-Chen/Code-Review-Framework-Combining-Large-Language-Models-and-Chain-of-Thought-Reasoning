# prthinker self-hosted deployment — Qwen3-Coder-30B server image.
#
# This is the portable Qwen3-Coder-30B-A3B deploy (CUDA runtime base,
# transformers<5, bf16, device_map="auto"). For the current Gemma-4-31B-it
# deploy on the local DGX Spark see docker-compose.server-gemma4.yml.
#
# Usage:
#   cp .env.example .env       # then edit values
#   docker compose -f docker-compose.server-qwen3-coder.yml up -d
#   curl http://localhost:9000/healthz
#
# Single service:
#   - prthinker  the FastAPI inference server (GPU), exposed directly on :9000
#
# Two named volumes keep state across image rebuilds:
#   - hf_cache    HuggingFace model weights (~80 GB for Qwen3-Coder-30B)
#   - data        dismissed.jsonl + accepted.jsonl + SQLite stores

services:
  prthinker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server-qwen3-coder
      args:
        CUDA_VERSION: ${CUDA_VERSION:-13.0.1}
    image: prthinker:server-latest
    restart: unless-stopped
    runtime: nvidia
    environment:
      # All PRTHINKER_* are picked up by the server at boot. See
      # READMEs/setup.md for the full list.
      PRTHINKER_DISMISSED_PATH: /data/dismissed.jsonl
      PRTHINKER_ACCEPTED_PATH:  /data/accepted.jsonl
      PRTHINKER_CACHE_PATH:     /data/cache.sqlite
      PRTHINKER_TELEMETRY_PATH: /data/telemetry.sqlite
      PRTHINKER_CACHE_ENABLED:    "true"
      PRTHINKER_TELEMETRY_ENABLED: "true"
      HF_HOME: /cache/huggingface
      # The hub cache lives at $HF_HOME/hub. The image's Dockerfile sets
      # the deprecated TRANSFORMERS_CACHE=/cache/huggingface (no /hub),
      # which transformers 4.x obeys and then looks in
      # /cache/huggingface/models--* (empty) instead of
      # /cache/huggingface/hub/models--* (the 57 GB of weights) — load
      # fails offline / hangs online re-downloading. Override to the real
      # hub path. (transformers 5.x ignored the deprecated var, masking it.)
      TRANSFORMERS_CACHE: /cache/huggingface/hub
      # Force local-cache-only model loading. Weights are already in the
      # mounted hf_cache volume; without this, transformers/huggingface_hub
      # still contacts huggingface.co (and cdn-lfs, which does not resolve
      # from this host) to re-check the revision on every boot, and a
      # stalled CDN request hangs from_pretrained indefinitely (model load
      # sits idle, all threads sleeping, GPU/RAM flat). Offline mode skips
      # the network entirely and loads straight from cache.
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      # Reduce CUDA allocator fragmentation so long-context attention
      # allocations don't trip OOM when contiguous space is scarce.
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    volumes:
      - hf_cache:/cache/huggingface
      - data:/data
      # LoRA adapter weights live on the host (trained out-of-band) and the
      # server references them via an absolute host path baked into
      # codes/run/fastapi_server.py. Mount the same path read-only so the
      # in-container resolver finds them.
      - /home/nknul40s/LLM_Research/codes/train/outputs-lora-qwen3-coder-30b:/home/nknul40s/LLM_Research/codes/train/outputs-lora-qwen3-coder-30b:ro
    ports:
      - "${PRTHINKER_HOST_PORT:-9000}:9000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  hf_cache:
  data:
