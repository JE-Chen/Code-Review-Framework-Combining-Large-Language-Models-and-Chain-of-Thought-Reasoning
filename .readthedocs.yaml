version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  # XeLaTeX + Noto CJK so the PDF format below renders the trilingual docs
  # end-to-end. pdflatex cannot handle CJK without heavy third-party packages;
  # XeLaTeX + fonts-noto-cjk is the standard-fixture path on Read the Docs.
  apt_packages:
    - texlive-xetex
    - texlive-fonts-recommended
    - texlive-fonts-extra
    - texlive-latex-recommended
    - texlive-latex-extra
    - texlive-lang-chinese
    - fonts-noto-cjk
    - latexmk

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .
      extra_requirements:
        - runner

formats:
  - htmlzip
  - pdf
