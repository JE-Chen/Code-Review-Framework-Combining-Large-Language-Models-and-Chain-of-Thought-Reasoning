# Codacy engine configuration.
#
# Mirrors what .prospector.yaml configures for the local prospector run,
# and turns off the engines / patterns Codacy ships by default that
# trip on this repo without surfacing real defects.

# Paths excluded from ALL Codacy tools. These are generated artifacts,
# fixture corpora, and canonical prompt text — not maintained source code
# — so style/lint findings on them are category mismatches, not defects.
exclude_paths:
  # Experiment outputs + RAG/fixture corpora. The bulk of the repo's
  # markdownlint findings live here (auto-generated model responses), plus
  # the deliberately-flawed code samples under datas/code_to_detect/ that
  # the framework REVIEWS as input — they are supposed to contain issues.
  - 'datas/**'
  # pip requirement manifests are parsed as Python by Codacy's pylint and
  # mis-flagged as "statement with no effect"; they are not Python modules.
  - 'requirements.txt'
  - 'dev_requirements.txt'
  # Canonical prompt templates. codes/run/CoT_Prompts/ is the source of
  # truth and prthinker/prompts/ is its byte-for-byte mirror (enforced by
  # tests/test_prompts_bundled.py). They are long instruction strings, not
  # code subject to line-length / escape-sequence style rules; the project
  # ruff config already tolerates them. Linting them here would only push
  # toward edits that change prompt content or break the mirror parity.
  - 'codes/run/CoT_Prompts/**'
  - 'prthinker/prompts/**'
  - 'codes/util/prompt_define.py'

engines:
  agentlinter:
    # Agentlinter is a prompt-quality linter for AI agent system prompts
    # (the "Absolute rule without escape hatch" / "Undefined acronym
    # 'HARD'" finding family). CLAUDE.md and READMEs/CLAUDE.md are
    # human-facing project guidelines, not agent prompts; the entire
    # rule family is a category mismatch on these files.
    exclude_paths:
      - "CLAUDE.md"
      - "READMEs/CLAUDE.md"

  prospector:
    exclude_paths:
      # The matrix workflow's --diff-since-last cache fallback lazy-
      # imports inside a try/except by design; PyLint's
      # import-outside-toplevel does not understand the runner-profile
      # rule that gates which modules may be loaded at module top.
      # The real correctness gate (ruff) catches the cases that matter.

  markdownlint:
    exclude_paths:
      # Auto-generated paper artifacts; markdownlint is not configured
      # to understand the list-numbering style this section uses.
