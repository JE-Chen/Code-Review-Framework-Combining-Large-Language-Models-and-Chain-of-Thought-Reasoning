{# 语言切换栏 — 由 theme 注入每一页，不再用 .rst 内手刻 inline link。 #}
{% extends "!layout.html" %}
{% set _depth = pagename.split('/') | length - 1 %}
{% set _up = '../' * _depth %}

{% block document %}
<div class="rm-langbar" role="navigation" aria-label="Language">
  <span class="rm-langbar-label">语言：</span>
  <a href="{{ _up }}../html-en/{{ pagename }}.html">English</a>
  <a href="{{ _up }}../html-zh-TW/{{ pagename }}.html">繁體中文</a>
  <span class="rm-langbar-current">简体中文</span>
</div>
{{ super() }}
{% endblock %}
