{# 語言切換列 — 由 theme 注入每一頁，不再用 .rst 內手刻 inline link。 #}
{% extends "!layout.html" %}
{% set _depth = pagename.split('/') | length - 1 %}
{% set _up = '../' * _depth %}

{% block document %}
<div class="pt-langbar" role="navigation" aria-label="Language">
  <span class="pt-langbar-label">語言：</span>
  <a href="{{ _up }}../html-en/{{ pagename }}.html">English</a>
  <span class="pt-langbar-current">繁體中文</span>
  <a href="{{ _up }}../html-zh-CN/{{ pagename }}.html">简体中文</a>
</div>
{{ super() }}
{% endblock %}
