name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements/ci.lock
      - run: python -m pip install -e . --no-deps
      - run: python -m pytest --cov=prthinker --cov-report=term-missing --cov-report=xml
      - uses: actions/upload-artifact@v6
        if: matrix.python-version == '3.12'
        with:
          name: coverage
          path: coverage.xml

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements/ci.lock
      - run: python -m pip install -e . --no-deps
      - run: ruff check prthinker tests
      - run: bandit -c pyproject.toml -r prthinker
      - run: python -m build
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: prthinker --help

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
