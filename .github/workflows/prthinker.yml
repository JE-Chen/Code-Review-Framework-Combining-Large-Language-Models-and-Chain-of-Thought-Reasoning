name: PRThinker

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

concurrency:
  group: prthinker-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  # fnmatch patterns (comma-separated) for paths that should not be
  # reviewed. Shared with the prthinker CLI via PRTHINKER_EXCLUDE_GLOBS
  # so the enumerate job and the runner agree on the same filter.
  PRTHINKER_EXCLUDE_GLOBS: ".idea/*,.idea/**/*,datas/*,datas/**/*,.prthinker/*,.prthinker/**/*,*.md,*.lock,*.json,docs/**/*"

  # Opt every JavaScript-based action (actions/checkout, setup-python,
  # cache, upload-artifact, …) into the Node.js 24 runtime ahead of
  # GitHub's 2026-06-16 forced cutover. Without this the runner emits
  # a deprecation warning on every step and will hard-fail once
  # Node.js 20 is removed on 2026-09-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # 1. List PR files (after dropping noise paths) and emit JSON for
  #    the per-file matrix. The state cache is restored first so we
  #    can drop files whose post-change blob SHA still matches the
  #    SHA recorded by the previous successful aggregate — those
  #    files don't enter the matrix at all (no runner shard starts),
  #    and their prior partial JSON is forwarded to the aggregate
  #    job as the `partial-skipped` artifact for re-use.
  enumerate:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      files: ${{ steps.list.outputs.files }}
      empty: ${{ steps.list.outputs.empty }}
      skipped: ${{ steps.list.outputs.skipped }}
      deleted: ${{ steps.list.outputs.deleted }}
    steps:
      - name: Restore prthinker state cache
        id: state-restore
        uses: actions/cache/restore@v4
        with:
          path: .prthinker/
          key: prthinker-state-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
          restore-keys: |
            prthinker-state-pr-${{ github.event.pull_request.number }}-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: List PR files and filter unchanged
        id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          set -euo pipefail
          # Pull every PR file with its current blob SHA. The blob SHA
          # is the content hash GitHub itself uses, so comparing it to
          # a previously-recorded value tells us — without any local
          # hashing — whether the file actually changed since then.
          ALL=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100" \
            --jq '[.[] | {path: .filename, sha: .sha, status: .status}]')
          ALL="$ALL" RUNNER_TEMP="$RUNNER_TEMP" python3 <<'PY'
          import fnmatch, hashlib, json, os, shutil
          from pathlib import Path

          raw = json.loads(os.environ["ALL"])
          patterns = [
              p.strip()
              for p in os.environ.get("PRTHINKER_EXCLUDE_GLOBS", "").split(",")
              if p.strip()
          ]
          def excluded(path):
              return any(fnmatch.fnmatch(path, pat) for pat in patterns)
          kept = [
              e for e in raw
              if e["status"] != "removed" and not excluded(e["path"])
          ]

          state = Path(".prthinker/pr-state")
          manifest_path = state / "manifest.json"
          partials_dir = state / "partials"
          skipped_dir = Path(os.environ["RUNNER_TEMP"]) / "skipped"
          skipped_dir.mkdir(parents=True, exist_ok=True)

          prev = {}
          if manifest_path.is_file():
              try:
                  data = json.loads(manifest_path.read_text(encoding="utf-8"))
                  prev = {
                      entry["path"]: entry["blob_sha"]
                      for entry in data.get("files", [])
                  }
              except Exception:  # noqa: BLE001 — corrupt cache rebuilds itself
                  prev = {}

          matrix = []
          skipped = 0
          for entry in kept:
              path = entry["path"]
              sha = entry["sha"]
              # Same content as last time AND a stored partial exists?
              # Then re-use the partial and skip the whole matrix shard.
              if prev.get(path) == sha:
                  digest = hashlib.sha256(path.encode("utf-8")).hexdigest()
                  partial = partials_dir / f"{digest}.json"
                  if partial.is_file():
                      shutil.copy2(partial, skipped_dir / f"{digest}.json")
                      skipped += 1
                      continue
              matrix.append(path)

          # Deleted (status "removed") files never enter the matrix —
          # there is nothing in the head checkout to review — but the PR
          # still touched them, so emit a finding-less, is_deleted partial
          # the aggregate will merge and render as "skipped (deleted)".
          deleted = [
              e["path"] for e in raw
              if e["status"] == "removed" and not excluded(e["path"])
          ]
          if deleted:
              deleted_dir = Path(os.environ["RUNNER_TEMP"]) / "deleted"
              deleted_dir.mkdir(parents=True, exist_ok=True)
              partial = {
                  "code_diff": "", "rag_docs": [], "step_outputs": {},
                  "inline_findings": [],
                  "per_file": [
                      {"path": p, "rag_docs": [], "step_outputs": {},
                       "inline_findings": [], "is_deleted": True}
                      for p in deleted
                  ],
              }
              (deleted_dir / "partial-deleted.json").write_text(
                  json.dumps(partial), encoding="utf-8")

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as fh:
              fh.write(f"files={json.dumps(matrix)}\n")
              fh.write(f"skipped={skipped}\n")
              fh.write(f"deleted={len(deleted)}\n")
              fh.write(f"empty={'true' if not matrix else 'false'}\n")
          print(f"Matrix ({len(matrix)} files): {matrix}")
          print(f"Skipped (unchanged): {skipped} · deleted: {len(deleted)}")
          PY

      - name: Upload reused partials for skipped files
        if: steps.list.outputs.skipped != '0' && steps.list.outputs.skipped != ''
        uses: actions/upload-artifact@v4
        with:
          name: partial-skipped
          path: ${{ runner.temp }}/skipped/
          if-no-files-found: ignore
          retention-days: 1

      # Deleted files don't get a matrix shard; this partial carries them
      # into the aggregate so the comment lists them as skipped (deleted).
      - name: Upload deleted-file partial
        if: steps.list.outputs.deleted != '0' && steps.list.outputs.deleted != ''
        uses: actions/upload-artifact@v4
        with:
          name: partial-deleted
          path: ${{ runner.temp }}/deleted/
          if-no-files-found: ignore
          retention-days: 1

  # 2. Per-file review. Each matrix iteration owns ONE path and has
  #    its own 60-min budget, so a single slow file can't starve the
  #    whole PR. max-parallel: 1 because the backend serialises on
  #    one GPU — parallel runners would just queue at /review/submit
  #    and burn CI minutes for nothing.
  review:
    needs: enumerate
    if: ${{ needs.enumerate.outputs.empty == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        file: ${{ fromJSON(needs.enumerate.outputs.files) }}
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[runner]"

      # Restore the per-PR state cache (manifest, prior partials, and
      # the in-runner diff-since-last SQLite). The matrix-level skip
      # already lives in the enumerate job — what this restore buys
      # is a layer-2 safety net: if a file made it into the matrix
      # but its hashed content still matches a finding the SQLite
      # remembers, the CoT pipeline short-circuits before any GPU
      # work. Only the aggregate job writes back to this key.
      - name: Restore prthinker state cache
        uses: actions/cache/restore@v4
        with:
          path: .prthinker/
          key: prthinker-state-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
          restore-keys: |
            prthinker-state-pr-${{ github.event.pull_request.number }}-

      - name: Run PRThinker for ${{ matrix.file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PRTHINKER_PR_NUMBER: ${{ github.event.pull_request.number }}

          # ----- Backend selection -----------------------------------------
          # `remote` is the project's own FastAPI inference server. Swap to
          # `openai` to drive any OpenAI-Chat-Completions endpoint (OpenAI,
          # Azure, vLLM, Ollama /v1, LM Studio, Together, Groq, …), or to
          # `anthropic` for Claude. See docs/guide/configuration.rst.
          PRTHINKER_BACKEND: remote
          PRTHINKER_REMOTE_URL: ${{ secrets.PRTHINKER_BACKEND_URL }}
          PRTHINKER_REMOTE_API_KEY: ${{ secrets.PRTHINKER_BACKEND_API_KEY }}
          PRTHINKER_USE_REMOTE_PIPELINE: "true"
          # How long the client polls /review/result before giving up.
          # The CLI's default is 600s, but a real multi-step CoT review of
          # one file on the 30B-A3B backend can exceed that, surfacing as
          # "Remote review job ... did not finish within 600.0s". The
          # job/poll pattern keeps each individual poll short (well under
          # any reverse-proxy edge timeout), so a long overall budget is
          # safe; the server keeps working regardless of this value.
          PRTHINKER_REMOTE_TIMEOUT: "1800"

          PRTHINKER_PER_FILE: "true"
          PRTHINKER_INLINE_REVIEW: "true"
          PRTHINKER_MAX_FINDINGS_PER_FILE: "10"
          # The CLI loops over the PR diff but skips every path except
          # this one — so the matrix iteration only spends GPU time on
          # the file it owns.
          PRTHINKER_TARGET_FILE: ${{ matrix.file }}
          # Write a partial ReviewResult instead of posting to GitHub.
          # The aggregate job downloads all partials and posts one
          # combined summary + inline review + gate close.
          PRTHINKER_OUTPUT_JSON: ${{ runner.temp }}/partial.json

          PRTHINKER_RAG_ENABLED: "true"
          PRTHINKER_REMOTE_RAG: "true"
          # Gate is owned by the aggregate job — see PRTHINKER_GATE_ON
          # in that job's env.
          PRTHINKER_GATE_ON: "none"
          PRTHINKER_INCLUDE_CI_SIGNALS: "true"

          # Hash each file's post-change content. On a re-push to the
          # same PR, files whose hash matches the previous run skip
          # the CoT pipeline and reuse the cached findings — saves
          # the bulk of GPU time on incremental fixes that only touch
          # one file.
          PRTHINKER_DIFF_SINCE_LAST: "true"
        run: |
          # Preflight: if the remote backend is unreachable, skip this
          # file. The aggregate job still runs and reports whatever
          # other matrix shards produced; if all shards skipped, it
          # posts a "backend unreachable" notice.
          if [ -z "$PRTHINKER_REMOTE_URL" ]; then
            echo "::warning::PRThinker skipped ${{ matrix.file }} — backend not configured"
            exit 0
          fi
          AUTH_HEADER=()
          if [ -n "$PRTHINKER_REMOTE_API_KEY" ]; then
            AUTH_HEADER=(-H "Authorization: Bearer $PRTHINKER_REMOTE_API_KEY")
          fi
          if ! curl -fsS --max-time 5 "${AUTH_HEADER[@]}" \
                   "$PRTHINKER_REMOTE_URL/healthz" > /dev/null; then
            echo "::warning::PRThinker skipped ${{ matrix.file }} — backend unreachable"
            exit 0
          fi

          python -m prthinker review-pr

      - name: Upload partial review JSON
        # always() so a skipped review (backend down) doesn't break
        # artifact collection — the upload step itself just no-ops if
        # the file is missing.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partial-${{ strategy.job-index }}
          path: ${{ runner.temp }}/partial.json
          if-no-files-found: ignore
          retention-days: 1

      # Checkpoint this shard's progress into the per-PR state cache
      # so a later aggregate failure doesn't force the next push to
      # re-scan every file. With max-parallel: 1 the shards are
      # serial, so each one restores the previous shard's checkpoint
      # (cumulative state) and writes a new checkpoint that includes
      # its own file. The aggregate job's canonical save (no -shard
      # suffix, written last) supersedes these checkpoints whenever
      # it completes; if it doesn't, the next run's prefix-restore
      # picks up the most recent shard checkpoint and at least the
      # work that finished before the failure isn't lost.
      - name: Update per-PR state with this shard's partial
        if: success()
        id: shard-state
        env:
          PARTIAL_PATH: ${{ runner.temp }}/partial.json
          TARGET_FILE: ${{ matrix.file }}
        run: |
          set -euo pipefail
          # A backend-unreachable shard exits 0 without writing
          # partial.json. Guard against recording an empty result that
          # would later be reused as if it were a real review.
          if [ ! -s "$PARTIAL_PATH" ]; then
            echo "No partial produced (backend skip?); not updating state"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # GitHub's blob SHA == git's blob SHA, so we can read it
          # straight from the working tree without an extra API call.
          if ! BLOB_SHA=$(git rev-parse "HEAD:$TARGET_FILE" 2>/dev/null); then
            echo "Could not get blob SHA for $TARGET_FILE; skipping state update"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PARTIAL_PATH="$PARTIAL_PATH" \
          TARGET_FILE="$TARGET_FILE" \
          BLOB_SHA="$BLOB_SHA" \
          python3 <<'PY'
          import hashlib, json, os, shutil
          from pathlib import Path

          target = os.environ["TARGET_FILE"]
          blob_sha = os.environ["BLOB_SHA"]
          partial_src = Path(os.environ["PARTIAL_PATH"])

          state = Path(".prthinker/pr-state")
          partials_dir = state / "partials"
          partials_dir.mkdir(parents=True, exist_ok=True)

          digest = hashlib.sha256(target.encode("utf-8")).hexdigest()
          shutil.copy2(partial_src, partials_dir / f"{digest}.json")

          manifest_path = state / "manifest.json"
          files = []
          if manifest_path.is_file():
              try:
                  data = json.loads(manifest_path.read_text(encoding="utf-8"))
                  files = [
                      e for e in data.get("files", [])
                      if e["path"] != target
                  ]
              except Exception:  # noqa: BLE001 — corrupt cache rebuilds itself
                  files = []
          files.append({"path": target, "blob_sha": blob_sha})
          manifest_path.write_text(
              json.dumps({"files": files}, indent=2), encoding="utf-8",
          )
          print(f"Checkpointed {target} -> {blob_sha[:12]}")
          PY
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Save shard state checkpoint
        if: success() && steps.shard-state.outputs.updated == 'true'
        uses: actions/cache/save@v4
        with:
          path: .prthinker/
          key: prthinker-state-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}-shard-${{ strategy.job-index }}

  # 3. Aggregate: download every matrix shard's partial JSON (plus
  #    any partial-skipped artifact carried over from enumerate),
  #    merge them, post ONE summary + ONE inline review, close the
  #    pre-merge gate, then write the canonical per-PR state cache
  #    that the next push's enumerate will read.
  aggregate:
    needs: [enumerate, review]
    # Run even when every file was reused (matrix empty but skipped > 0)
    # because the new PR HEAD still needs its own check-run + comment
    # upsert. Also runs on partial review failures so successful shards'
    # findings still get posted.
    if: >-
      ${{ always() &&
          (needs.enumerate.outputs.empty == 'false' ||
           needs.enumerate.outputs.skipped != '0') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[runner]"

      # Restore the per-PR state cache so the write-state step at the
      # end of this job can wipe + rebuild the partials dir against a
      # known baseline (defends against half-written state from a run
      # that died mid-aggregate).
      - name: Restore prthinker state cache
        uses: actions/cache/restore@v4
        with:
          path: .prthinker/
          key: prthinker-state-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
          restore-keys: |
            prthinker-state-pr-${{ github.event.pull_request.number }}-

      - name: Download all partial review artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/partials
          pattern: partial-*
          merge-multiple: false

      # HARD RULE: a file's prior review result is NEVER lost from the
      # posted PR review just because this run failed to refresh it.
      # The restored per-PR state cache already sits at
      # .prthinker/pr-state/partials/<sha256(path)>.json; copy them in
      # under a name that sorts FIRST so the aggregate command
      # (which is last-write-wins on duplicate paths) lets this run's
      # matrix output override the prior partial, while any file the
      # matrix did not touch is still posted with its prior findings.
      - name: Carry prior partials forward into aggregate input
        if: hashFiles('.prthinker/pr-state/partials/*.json') != ''
        run: |
          set -euo pipefail
          DEST="${{ runner.temp }}/partials/aaa-prior-state"
          mkdir -p "$DEST"
          cp -r .prthinker/pr-state/partials/. "$DEST"/
          COUNT=$(find "$DEST" -name "*.json" | wc -l)
          echo "Carried $COUNT prior partial(s) forward into aggregate input."

      - name: Aggregate and post
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PRTHINKER_PR_NUMBER: ${{ github.event.pull_request.number }}
          PRTHINKER_INLINE_REVIEW: "true"
          PRTHINKER_GATE_ON: "error"
          PRTHINKER_AGGREGATE_FROM: ${{ runner.temp }}/partials
        run: |
          # If neither a matrix shard nor enumerate's skip path
          # produced any partial JSON (e.g. backend was unreachable
          # for the whole run AND this is the first push, so there
          # was nothing to reuse), post a single skip notice under
          # the standard marker so reviewers know why the PR has
          # no review.
          if ! find "$PRTHINKER_AGGREGATE_FROM" -name "*.json" -print -quit | grep -q .; then
            MARKER='<!-- prthinker:summary -->'
            BODY=$(printf '%s\n' \
              "$MARKER" \
              "" \
              "## PRThinker — skipped" \
              "" \
              "The automated review did not run on this push: **no partial reviews were produced**." \
              "" \
              "This usually means the inference backend was unreachable from every matrix runner." \
              "Re-pushing after the backend is reachable will overwrite this notice with a real review.")
            gh pr comment "$PRTHINKER_PR_NUMBER" --body "$BODY" --edit-last \
              || gh pr comment "$PRTHINKER_PR_NUMBER" --body "$BODY"
            exit 0
          fi

          python -m prthinker aggregate

      # Rebuild .prthinker/pr-state from the downloaded partials +
      # the current PR files API so the NEXT push's enumerate job
      # can skip files whose blob SHA still matches. Each file's
      # partial is rewritten to its own JSON keyed by sha256(path),
      # and the manifest records the blob SHA observed at this
      # aggregate's vantage point.
      - name: Write fresh per-PR state cache
        id: write-state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DOWNLOAD_DIR: ${{ runner.temp }}/partials
        run: |
          set -euo pipefail
          ALL=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100" \
            --jq '[.[] | {path: .filename, sha: .sha, status: .status}]')
          ALL="$ALL" DOWNLOAD_DIR="$DOWNLOAD_DIR" python3 <<'PY'
          import hashlib, json, os
          from pathlib import Path

          files_data = json.loads(os.environ["ALL"])
          download = Path(os.environ["DOWNLOAD_DIR"])
          state = Path(".prthinker/pr-state")
          partials_dir = state / "partials"
          partials_dir.mkdir(parents=True, exist_ok=True)
          state.mkdir(parents=True, exist_ok=True)

          # HARD RULE: a file's prior review result is NEVER discarded
          # just because this run could not refresh it. partial-skipped
          # upload failures, actions/cache restore misses, and matrix
          # shard crashes all can leave files out of `download`; we
          # must fall back to whatever the restored prior state cache
          # already has on disk before deciding to drop an entry.

          # Read the prior partials / manifest BEFORE writing anything,
          # so we have a stable fallback layer even if this run produced
          # nothing for a file.
          prior_path_to_fr: dict[str, dict] = {}
          for prior_jp in sorted(partials_dir.rglob("*.json")):
              try:
                  prior_payload = json.loads(prior_jp.read_text(encoding="utf-8"))
              except Exception:
                  continue
              for fr in prior_payload.get("per_file", []):
                  prior_path_to_fr[fr["path"]] = fr

          prior_blob_sha: dict[str, str] = {}
          prior_manifest_path = state / "manifest.json"
          if prior_manifest_path.exists():
              try:
                  prior_manifest = json.loads(
                      prior_manifest_path.read_text(encoding="utf-8")
                  )
                  prior_blob_sha = {
                      f["path"]: f["blob_sha"]
                      for f in prior_manifest.get("files", [])
                  }
              except Exception:
                  prior_blob_sha = {}

          # Build path -> latest per_file entry across every downloaded
          # partial JSON for THIS run. Last-write-wins matches the merge
          # semantics the aggregate command itself uses.
          this_run_path_to_fr: dict[str, dict] = {}
          for jp in sorted(download.rglob("*.json")):
              try:
                  payload = json.loads(jp.read_text(encoding="utf-8"))
              except Exception:
                  continue
              for fr in payload.get("per_file", []):
                  this_run_path_to_fr[fr["path"]] = fr

          # Effective per_file = this run, falling back to prior. A file
          # only gets dropped if BOTH this run AND the prior cache lack
          # any partial for it (truly never-reviewed) or if it is no
          # longer in the PR.
          effective_path_to_fr = dict(prior_path_to_fr)
          effective_path_to_fr.update(this_run_path_to_fr)

          # Keep only files still in the PR. Removed files lose their
          # partial; everything else is preserved.
          current_paths = {
              entry["path"] for entry in files_data
              if entry["status"] != "removed"
          }

          # Rewrite the partials dir from the effective view. We do NOT
          # rmtree first — we only overwrite digests we are about to
          # rewrite and unlink digests for paths that left the PR. This
          # makes the step idempotent on partial failures.
          kept_digests: set[str] = set()
          written = 0
          reused = 0
          for path, fr in effective_path_to_fr.items():
              if path not in current_paths:
                  continue
              digest = hashlib.sha256(path.encode("utf-8")).hexdigest()
              kept_digests.add(digest)
              single = {
                  "code_diff": "",
                  "rag_docs": [],
                  "step_outputs": {},
                  "inline_findings": [],
                  "per_file": [fr],
              }
              (partials_dir / f"{digest}.json").write_text(
                  json.dumps(single, indent=2), encoding="utf-8",
              )
              if path in this_run_path_to_fr:
                  written += 1
              else:
                  reused += 1

          # Drop digests for paths that left the PR (or never existed).
          dropped = 0
          for existing in partials_dir.glob("*.json"):
              if existing.stem not in kept_digests:
                  existing.unlink()
                  dropped += 1

          # Rebuild manifest. For files refreshed this run, store the
          # current blob_sha so the next enumerate skips them on a
          # genuine no-op push. For files we are merely carrying over
          # from prior cache (this run didn't touch them), keep the
          # PRIOR blob_sha — anything else would lie about when this
          # file's review was actually computed and could mislead the
          # next enumerate into reusing a stale partial.
          path_to_current_sha = {
              entry["path"]: entry["sha"]
              for entry in files_data
              if entry["status"] != "removed"
          }
          manifest_files = []
          for path in sorted(current_paths):
              digest = hashlib.sha256(path.encode("utf-8")).hexdigest()
              if digest not in kept_digests:
                  continue
              if path in this_run_path_to_fr:
                  blob_sha = path_to_current_sha.get(path, "")
              else:
                  blob_sha = prior_blob_sha.get(path, "")
              if not blob_sha:
                  continue
              manifest_files.append({"path": path, "blob_sha": blob_sha})

          (state / "manifest.json").write_text(
              json.dumps({"files": manifest_files}, indent=2),
              encoding="utf-8",
          )
          print(
              f"State cache rewritten: "
              f"{written} refreshed, {reused} carried over, "
              f"{dropped} dropped; manifest has {len(manifest_files)} files"
          )
          PY

      - name: Save prthinker state cache
        if: always() && steps.write-state.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: .prthinker/
          key: prthinker-state-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
